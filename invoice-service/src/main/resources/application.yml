spring:
  application:
    name: invoice-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/invoice_db
    username: ${MYSQL_USER:invoice}
    password: ${MYSQL_PASSWORD:invoice}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

server:
  port: 8080

logging:
  level:
    com.accountingengine: INFO
    org.hibernate.SQL: WARN
